        <rect x="36" y="-2" width="3" height="20" fill="#60a5fa"/>

        <g>
          <text x="36" y="14" fill="rgba(255,255,255,0.88)"><tspan fill="#c084fc">registerTabType</tspan>({</text>
          <text x="36" y="38" fill="rgba(255,255,255,0.88)">  <tspan fill="#fbbf24">type</tspan>: <tspan fill="#86efac">&apos;issue-list&apos;</tspan>,</text>
          <text x="36" y="62" fill="rgba(255,255,255,0.88)">  <tspan fill="#fbbf24">label</tspan>: <tspan fill="#86efac">&apos;Issues&apos;</tspan>,</text>
          <text x="36" y="86" fill="rgba(255,255,255,0.88)">  <tspan fill="#fbbf24">tabIcon</tspan>: <tspan fill="#86efac">&apos;circle-dot&apos;</tspan>,</text>
          <text x="36" y="110" fill="rgba(255,255,255,0.88)">  <tspan fill="#fbbf24">defaultPlacement</tspan>: <tspan fill="#86efac">&apos;top&apos;</tspan>,</text>
          <text x="36" y="134" fill="rgba(255,255,255,0.88)">  <tspan fill="#fbbf24">singleton</tspan>: <tspan fill="#f472b6">true</tspan>,</text>

          <rect x="36" y="146" width="442" height="20" fill="rgba(168,85,247,0.10)"/>
          <rect x="36" y="146" width="3" height="20" fill="#a855f7"/>
          <text x="36" y="158" fill="rgba(255,255,255,0.88)">  <tspan fill="#60a5fa">async</tspan> <tspan fill="#c084fc">renderContent</tspan>(<tspan fill="#fbbf24">tab</tspan>) {</text>

          <rect x="36" y="170" width="442" height="20" fill="rgba(34,197,94,0.10)"/>
          <text x="36" y="182" fill="#86efac">    <tspan>+ </tspan><tspan fill="#60a5fa">const</tspan> issues = <tspan fill="#60a5fa">await</tspan> <tspan fill="#c084fc">fetchIssues</tspan>(tab.repo);</text>

          <rect x="36" y="194" width="442" height="20" fill="rgba(34,197,94,0.10)"/>
          <text x="36" y="206" fill="#86efac">    <tspan>+ </tspan><tspan fill="#60a5fa">return</tspan> <tspan fill="#c084fc">renderList</tspan>(issues);</text>

          <text x="36" y="230" fill="rgba(255,255,255,0.88)">  },</text>
        </g>
        <line x1="160" y1="166" x2="160" y2="186" stroke="#fff" stroke-width="1.5" opacity="0.85">
          <animate attributeName="opacity" values="0.85;0;0.85" dur="1.1s" repeatCount="indefinite"/>
        </line>
