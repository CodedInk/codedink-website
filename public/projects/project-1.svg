          <circle cx="20" cy="17" r="8" fill="rgba(244,114,182,0.22)" stroke="#f472b6" stroke-width="1.4"/>
          <text x="20" y="21" text-anchor="middle" fill="#f9a8d4" font-size="11" font-weight="700">3</text>
          <text x="40" y="14" fill="#fff" font-size="12" font-weight="600">Add streaming skeleton</text>
          <text x="40" y="28" fill="rgba(255,255,255,0.5)" font-family="JetBrains Mono, monospace" font-size="10">tab-types.js · +9</text>
          <g transform="translate(380 12)"><circle cx="6" cy="6" r="6" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/></g>
        </g>
      </g>

      <g transform="translate(24 234)">
        <rect width="200" height="38" rx="11" fill="url(#ctaGrad)"/>
        <rect width="200" height="38" rx="11" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
        <text x="100" y="24" text-anchor="middle" fill="#fff" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="800" letter-spacing="0.6">APPLY ALL · 3 CHANGES</text>

        <g transform="translate(212 0)">
