        <text fill="rgba(255,255,255,0.92)" font-weight="500">I read <tspan fill="#c084fc" font-family="JetBrains Mono, monospace" font-size="12">#247</tspan> and the diff. Wiring</text>
        <text y="20" fill="rgba(255,255,255,0.92)" font-weight="500"><tspan fill="#c084fc" font-family="JetBrains Mono, monospace" font-size="12">renderContent</tspan> through <tspan fill="#c084fc" font-family="JetBrains Mono, monospace" font-size="12">fetchIssues</tspan> now —</text>
        <text y="40" fill="rgba(255,255,255,0.92)" font-weight="500">3 changes ready to review.</text>
      </g>

