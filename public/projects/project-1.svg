          <circle cx="20" cy="17" r="8" fill="rgba(168,85,247,0.22)" stroke="#a855f7" stroke-width="1.4"/>
          <text x="20" y="21" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="700">2</text>
          <text x="40" y="14" fill="#fff" font-size="12" font-weight="600">Make renderContent async</text>
          <text x="40" y="28" fill="rgba(255,255,255,0.5)" font-family="JetBrains Mono, monospace" font-size="10">tab-types.js · +6 −2</text>
          <g transform="translate(380 12)"><circle cx="6" cy="6" r="6" fill="rgba(34,197,94,0.16)"/><path d="M3 6 l2 2 l4 -4" stroke="#4ade80" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></g>
        </g>
        <g transform="translate(0 84)">
