          <text x="0" y="86" text-anchor="end" dx="20">145</text>
          <text x="0" y="110" text-anchor="end" dx="20">146</text>
          <text x="0" y="134" text-anchor="end" dx="20">147</text>
          <text x="0" y="158" text-anchor="end" dx="20">148</text>
          <text x="0" y="182" text-anchor="end" dx="20">149</text>
          <text x="0" y="206" text-anchor="end" dx="20">150</text>
