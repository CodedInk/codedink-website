          <circle cx="20" cy="17" r="8" fill="rgba(96,165,250,0.2)" stroke="#60a5fa" stroke-width="1.4"/>
          <text x="20" y="21" text-anchor="middle" fill="#60a5fa" font-size="11" font-weight="700">1</text>
          <text x="40" y="14" fill="#fff" font-size="12" font-weight="600">Add fetchIssues helper</text>
          <text x="40" y="28" fill="rgba(255,255,255,0.5)" font-family="JetBrains Mono, monospace" font-size="10">utils.js · +14</text>
          <g transform="translate(380 12)"><circle cx="6" cy="6" r="6" fill="rgba(34,197,94,0.16)"/><path d="M3 6 l2 2 l4 -4" stroke="#4ade80" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></g>
        </g>
        <g transform="translate(0 42)">
