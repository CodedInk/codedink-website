<svg width="1200" height="900" viewBox="0 0 1200 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="GLINT — Issue-driven AI development environment">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050810"/>
      <stop offset="50%" stop-color="#0a0c1a"/>
      <stop offset="100%" stop-color="#170926"/>
    </linearGradient>
    <linearGradient id="glintGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="glintGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="60%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(20,24,36,0.92)"/>
      <stop offset="100%" stop-color="rgba(10,12,20,0.92)"/>
    </linearGradient>
    <linearGradient id="panelStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.04)"/>
    </linearGradient>
    <linearGradient id="assistPanel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(168,85,247,0.18)"/>
      <stop offset="100%" stop-color="rgba(20,24,36,0.92)"/>
    </linearGradient>
    <linearGradient id="avatarGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="ctaGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <radialGradient id="blobBlue" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="rgba(59,130,246,0.55)"/>
      <stop offset="60%" stop-color="rgba(59,130,246,0.06)"/>
      <stop offset="100%" stop-color="rgba(59,130,246,0)"/>
    </radialGradient>
    <radialGradient id="blobPurple" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="rgba(168,85,247,0.6)"/>
      <stop offset="60%" stop-color="rgba(168,85,247,0.06)"/>
      <stop offset="100%" stop-color="rgba(168,85,247,0)"/>
    </radialGradient>
    <radialGradient id="blobPink" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="rgba(236,72,153,0.4)"/>
      <stop offset="100%" stop-color="rgba(236,72,153,0)"/>
    </radialGradient>
    <pattern id="dot" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.9" fill="rgba(255,255,255,0.06)"/>
    </pattern>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dy="14"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.65"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <rect width="1200" height="900" fill="url(#bg)"/>
  <ellipse cx="180" cy="160" rx="540" ry="380" fill="url(#blobBlue)"/>
  <ellipse cx="1040" cy="760" rx="500" ry="380" fill="url(#blobPurple)"/>
  <ellipse cx="600" cy="940" rx="600" ry="180" fill="url(#blobPink)"/>
  <rect width="1200" height="900" fill="url(#dot)"/>

  <g opacity="0.18" stroke="rgba(255,255,255,0.5)" stroke-width="0.6" fill="none">
    <path d="M0 200 Q 300 180 600 200 T 1200 200"/>
    <path d="M0 720 Q 300 700 600 720 T 1200 720"/>
  </g>

  <text x="600" y="640" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="380" font-weight="900" fill="url(#glintGrad2)" opacity="0.10" letter-spacing="-22">GLINT</text>

  <g transform="translate(86 96)">
    <g transform="translate(8 14)" filter="url(#shadow)">
      <rect width="404" height="220" rx="22" fill="url(#panel)"/>
    </g>
    <g transform="rotate(-2.5 210 110)">
      <rect width="420" height="232" rx="22" fill="url(#panel)"/>
      <rect width="420" height="232" rx="22" fill="none" stroke="url(#panelStroke)" stroke-width="1"/>

      <g transform="translate(24 24)">
        <rect width="22" height="22" rx="11" fill="rgba(34,197,94,0.16)"/>
        <circle cx="11" cy="11" r="4" fill="none" stroke="#4ade80" stroke-width="1.6"/>
        <text x="36" y="16" fill="#4ade80" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" letter-spacing="1">OPEN</text>
        <text x="80" y="16" fill="rgba(255,255,255,0.4)" font-family="JetBrains Mono, monospace" font-size="12">codedink/website#247</text>
        <g transform="translate(360 0)">
          <circle r="4" cx="6" cy="11" fill="#22c55e"/>
        </g>
      </g>

      <text x="24" y="92" fill="#fff" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700">Stage by hunk in GitPanel</text>

      <text x="24" y="124" fill="rgba(255,255,255,0.6)" font-family="Inter, system-ui, sans-serif" font-size="13">Let devs stage individual hunks inline instead of the whole file —</text>
      <text x="24" y="142" fill="rgba(255,255,255,0.6)" font-family="Inter, system-ui, sans-serif" font-size="13">it&apos;s the muscle memory people bring from the terminal.</text>

      <g transform="translate(24 168)">
        <rect width="80" height="22" rx="11" fill="rgba(96,165,250,0.16)"/>
        <text x="40" y="15" text-anchor="middle" fill="#93c5fd" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700">design</text>
      </g>
      <g transform="translate(112 168)">
        <rect width="100" height="22" rx="11" fill="rgba(168,85,247,0.18)"/>
        <text x="50" y="15" text-anchor="middle" fill="#c4b5fd" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700">ide / git</text>
      </g>

      <g transform="translate(24 200)">
        <circle cx="12" cy="12" r="12" fill="url(#avatarGrad)"/>
        <text x="32" y="17" fill="rgba(255,255,255,0.7)" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500">kasper · 2 days ago</text>
      </g>

      <text x="320" y="216" fill="rgba(96,165,250,0.85)" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600">PINNED →</text>
    </g>
  </g>

  <g stroke-dasharray="3 4" stroke-width="1.6" fill="none" opacity="0.55">
    <path d="M 510 296 C 540 320 580 320 600 360" stroke="url(#glintGrad)"/>
  </g>
  <circle cx="600" cy="360" r="3.5" fill="#a855f7"/>

  <g transform="translate(386 280)">
    <g transform="translate(10 16)" filter="url(#shadow)">
      <rect width="500" height="320" rx="22" fill="url(#panel)"/>
    </g>
    <g transform="rotate(0.5 250 160)">
      <rect width="500" height="320" rx="22" fill="url(#panel)"/>
      <rect width="500" height="320" rx="22" fill="none" stroke="url(#panelStroke)" stroke-width="1"/>

      <g transform="translate(0 0)">
        <rect width="500" height="42" rx="22" fill="rgba(8,9,15,0.7)"/>
        <rect y="20" width="500" height="22" fill="rgba(8,9,15,0.7)"/>
        <circle cx="22" cy="22" r="5" fill="#ff5f57"/>
        <circle cx="40" cy="22" r="5" fill="#febc2e"/>
        <circle cx="58" cy="22" r="5" fill="#28c840"/>

        <g transform="translate(80 8)">
          <rect width="120" height="26" rx="8" fill="rgba(255,255,255,0.06)"/>
          <rect width="120" height="2" fill="url(#glintGrad)"/>
          <text x="60" y="17" text-anchor="middle" fill="#fff" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600">tab-types.js</text>
        </g>
        <text x="220" y="25" fill="rgba(255,255,255,0.45)" font-family="JetBrains Mono, monospace" font-size="11">utils.js</text>
        <text x="278" y="25" fill="rgba(255,255,255,0.45)" font-family="JetBrains Mono, monospace" font-size="11">styles.css</text>

        <g transform="translate(440 12)">
          <rect width="48" height="20" rx="10" fill="rgba(34,197,94,0.16)" stroke="rgba(34,197,94,0.4)" stroke-width="1"/>
          <circle cx="11" cy="10" r="3" fill="#22c55e"/>
          <text x="22" y="14" fill="#86efac" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" letter-spacing="0.5">SYNC</text>
        </g>
      </g>

      <g transform="translate(20 64)" font-family="JetBrains Mono, monospace" font-size="13">
        <g fill="rgba(255,255,255,0.32)" font-size="11">
